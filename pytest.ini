# pytest.ini
# Configuração do pytest para o projeto EduPBL

[pytest]
# Diretórios de teste
testpaths = tests

# Padrões de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

# Opções padrão
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov-report=term-missing
    --cov-report=html
    --cov-branch

# Markers customizados
markers =
    unit: Testes unitários de funções isoladas
    integration: Testes de integração
    slow: Testes lentos (podem ser pulados)
    security: Testes de segurança

# Mínimo de cobertura exigido
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Mensagens de cobertura
fail_under = 80

[coverage:html]
directory = htmlcov